<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard Matières Premières - Pipeline Web Scraping</title>
    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i {
            color: #3b82f6;
        }
        .badge {
            background: #3b82f6;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Cartes de métriques */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1);
        }
        .metric-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .metric-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
        }
        .metric-unit {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-left: 5px;
        }

        /* Panneau de contrôle */
        .controls {
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }
        select, input, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #64748b;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .btn-scrape {
            background: #10b981;
        }
        .btn-scrape:hover {
            background: #059669;
        }

        /* Graphique */
        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .chart-container h3 {
            margin-bottom: 15px;
            color: #1e293b;
        }
        canvas {
            max-height: 400px;
            width: 100%;
        }

        /* Tableau */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 0;
            overflow-x: auto;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f1f5f9;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
        tr:hover {
            background: #f8fafc;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .page-btn {
            width: auto;
            padding: 8px 14px;
            background: white;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
        }
        .page-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* Logs */
        .logs-panel {
            background: white;
            border-radius: 20px;
            margin-top: 30px;
            padding: 20px;
            display: none;
        }
        .logs-panel.show {
            display: block;
        }
        .log-entry {
            padding: 12px;
            border-left: 4px solid #3b82f6;
            background: #f8fafc;
            margin-bottom: 10px;
            border-radius: 12px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .controls { flex-direction: column; }
            .metrics-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- En-tête -->
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Dashboard Matières Premières</h1>
        <div class="badge">Pipeline OR - Monitoring & Scraping</div>
    </div>

    <!-- Cartes métriques -->
    <div class="metrics-grid" id="metricsGrid">
        <div class="metric-card"><div class="metric-title"><i class="fas fa-database"></i> Total enregistrements</div><div class="metric-value" id="totalRecords">—</div></div>
        <div class="metric-card"><div class="metric-title"><i class="fas fa-chart-simple"></i> Dernier prix (or)</div><div class="metric-value" id="lastGoldPrice">—</div></div>
        <div class="metric-card"><div class="metric-title"><i class="fas fa-clock"></i> Dernier scraping</div><div class="metric-value" id="lastScrape">—</div></div>
        <div class="metric-card"><div class="metric-title"><i class="fas fa-tasks"></i> Tâches Celery</div><div class="metric-value" id="celeryStatus">—</div></div>
    </div>

    <!-- Filtres et actions -->
    <div class="controls">
        <div class="filter-group">
            <label><i class="fas fa-tag"></i> Catégorie</label>
            <select id="categorie">
                <option value="">Toutes</option>
                <option value="metals">Métaux</option>
                <option value="energy">Énergie</option>
                <option value="commodities">Commodités</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-cube"></i> Matière</label>
            <input type="text" id="matiere" placeholder="ex: gold, corn, oil">
        </div>
        <div class="filter-group">
            <label><i class="fas fa-calendar"></i> Année</label>
            <input type="number" id="annee" placeholder="2024">
        </div>
        <div class="filter-group">
            <button id="loadDataBtn"><i class="fas fa-search"></i> Rechercher</button>
        </div>
        <div class="filter-group">
            <button id="scrapeAsyncBtn" class="btn-scrape"><i class="fas fa-cloud-upload-alt"></i> Scraping Async</button>
        </div>
        <div class="filter-group">
            <button id="scrapeSyncBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Scraping Sync</button>
        </div>
        <div class="filter-group">
            <button id="viewLogsBtn" class="btn-secondary"><i class="fas fa-history"></i> Logs</button>
        </div>
    </div>

    <!-- Graphique d'évolution des prix -->
    <div class="chart-container">
        <h3><i class="fas fa-chart-line"></i> Évolution des prix (derniers 30 jours)</h3>
        <canvas id="priceChart" width="800" height="300"></canvas>
    </div>

    <!-- Tableau des données -->
    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr><th>Date</th><th>Matière</th><th>Catégorie</th><th>Prix (USD)</th><th>Unité</th><th>Source</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Logs panel -->
    <div id="logsPanel" class="logs-panel">
        <h3><i class="fas fa-history"></i> Historique des exécutions</h3>
        <div id="logsContent"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Configuration
    const API_BASE = 'http://localhost:5000';
    let currentPage = 1;
    let limit = 15;
    let currentFilters = { categorie: '', matiere: '', annee: '' };
    let totalPages = 1;
    let priceChart = null;

    // Éléments DOM
    const tableBody = document.getElementById('tableBody');
    const loadDataBtn = document.getElementById('loadDataBtn');
    const scrapeAsyncBtn = document.getElementById('scrapeAsyncBtn');
    const scrapeSyncBtn = document.getElementById('scrapeSyncBtn');
    const viewLogsBtn = document.getElementById('viewLogsBtn');
    const logsPanel = document.getElementById('logsPanel');
    const logsContent = document.getElementById('logsContent');
    const paginationDiv = document.getElementById('pagination');
    const toastDiv = document.getElementById('toast');

    // Helper : afficher un toast
    function showToast(message, isError = false) {
        toastDiv.textContent = message;
        toastDiv.style.background = isError ? '#dc2626' : '#10b981';
        toastDiv.classList.add('show');
        setTimeout(() => toastDiv.classList.remove('show'), 4000);
    }

    // Charger les métriques (statistiques)
    async function loadMetrics() {
        try {
            const res = await fetch(`${API_BASE}/stats`);
            const json = await res.json();
            if (json.status === 'success') {
                const total = json.data.reduce((acc, m) => acc + m.nb_obs, 0);
                document.getElementById('totalRecords').innerText = total.toLocaleString();
                const gold = json.data.find(m => m.matiere === 'gold');
                if (gold) document.getElementById('lastGoldPrice').innerText = `${gold.prix_moyen?.toFixed(2) || '—'} USD/oz`;
                
                const logsRes = await fetch(`${API_BASE}/logs?limit=1`);
                const logsJson = await logsRes.json();
                if (logsJson.status === 'success' && logsJson.data.length > 0) {
                    const last = logsJson.data[0];
                    document.getElementById('lastScrape').innerText = last.started_at ? new Date(last.started_at).toLocaleString() : '—';
                }
            }
        } catch(e) { console.error(e); }
    }

    // Charger les données avec filtres (version corrigée)
    async function loadData(page = 1) {
        currentPage = page;
        // Récupérer les valeurs actuelles des champs
        const categorieValue = document.getElementById('categorie').value;
        const matiereValue = document.getElementById('matiere').value;
        const anneeValue = document.getElementById('annee').value;
        
        // Mettre à jour currentFilters
        currentFilters.categorie = categorieValue;
        currentFilters.matiere = matiereValue;
        currentFilters.annee = anneeValue;
        
        const params = new URLSearchParams();
        params.append('page', currentPage);
        params.append('limit', limit);
        if (currentFilters.categorie) params.append('categorie', currentFilters.categorie);
        if (currentFilters.matiere) params.append('matiere', currentFilters.matiere);
        if (currentFilters.annee) params.append('annee', currentFilters.annee);
        
        console.log('Requête API :', `${API_BASE}/data?${params.toString()}`); // Débogage
        
        try {
            const response = await fetch(`${API_BASE}/data?${params.toString()}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.status === 'success') {
                renderTable(result.data);
                renderPagination(result.pagination);
                updateChart(result.data);
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="6">Erreur : ${error.message}</td></tr>`;
            showToast(error.message, true);
        }
    }

    // Remplir le tableau
    function renderTable(data) {
        if (!data || data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6">Aucune donnée trouvée</td></tr>';
            return;
        }
        tableBody.innerHTML = data.map(item => `
            <tr>
                <td>${item.date || ''}</td>
                <td><strong>${item.matiere || ''}</strong></td>
                <td>${item.categorie || ''}</td>
                <td>${item.prix?.toFixed(4) || ''}</td>
                <td>${item.unite || ''}</td>
                <td style="font-size:0.8rem">${item.source ? item.source.substring(0, 40) + '…' : ''}</td>
            </tr>
        `).join('');
    }

    // Pagination
    function renderPagination(pagination) {
        if (!pagination || pagination.pages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }
        let html = '';
        for (let i = 1; i <= pagination.pages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        paginationDiv.innerHTML = html;
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const page = parseInt(e.target.dataset.page);
                loadData(page);
            });
        });
    }

    // Mettre à jour le graphique
    function updateChart(data) {
        if (!priceChart) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        const grouped = {};
        data.forEach(item => {
            if (!grouped[item.matiere]) grouped[item.matiere] = [];
            grouped[item.matiere].push({ date: item.date, prix: item.prix });
        });
        const datasets = [];
        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'];
        let i = 0;
        for (const [matiere, points] of Object.entries(grouped)) {
            const sorted = points.sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-30);
            datasets.push({
                label: matiere,
                data: sorted.map(p => p.prix),
                borderColor: colors[i % colors.length],
                fill: false,
                tension: 0.2
            });
            i++;
        }
        const labels = Object.values(grouped)[0]?.slice(-30).map(p => p.date) || [];
        priceChart.data.labels = labels;
        priceChart.data.datasets = datasets;
        priceChart.update();
    }

    // Scraping synchrone
    async function runScrapeSync() {
        showToast('⏳ Scraping synchrone en cours...');
        try {
            const response = await fetch(`${API_BASE}/scrape`, { method: 'POST' });
            const result = await response.json();
            if (response.ok) {
                showToast(`✅ Scraping terminé ! ${result.nb_lignes} lignes insérées.`);
                loadData(1);
                loadMetrics();
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            showToast(`❌ Erreur : ${error.message}`, true);
        }
    }

    // Scraping asynchrone
    async function runScrapeAsync() {
        showToast('🚀 Scraping asynchrone lancé');
        try {
            const response = await fetch(`${API_BASE}/scrape/async`, { method: 'POST' });
            const result = await response.json();
            if (response.ok) {
                showToast(`Task ID: ${result.task_id}. Surveillance...`);
                pollTaskStatus(result.task_id);
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            showToast(`❌ Erreur : ${error.message}`, true);
        }
    }

    async function pollTaskStatus(taskId) {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/scrape/status/${taskId}`);
                const data = await res.json();
                if (data.status === 'SUCCESS') {
                    showToast(`✅ Tâche ${taskId} terminée !`);
                    clearInterval(interval);
                    loadData(1);
                    loadMetrics();
                } else if (data.status === 'FAILURE') {
                    showToast(`❌ Tâche échouée : ${data.result}`, true);
                    clearInterval(interval);
                }
            } catch(e) {}
        }, 3000);
    }

    // Afficher les logs
    async function showLogs() {
        try {
            const response = await fetch(`${API_BASE}/logs`);
            const result = await response.json();
            if (result.status === 'success') {
                logsContent.innerHTML = result.data.map(log => `
                    <div class="log-entry">
                        <strong>${new Date(log.started_at).toLocaleString()}</strong> - ${log.status}
                        (${log.nb_lignes || 0} lignes)
                        ${log.erreurs ? `<span style="color:red">Erreur : ${log.erreurs}</span>` : ''}
                    </div>
                `).join('');
                logsPanel.classList.add('show');
            } else {
                logsContent.innerHTML = 'Aucun log trouvé.';
            }
        } catch (error) {
            logsContent.innerHTML = `Erreur : ${error.message}`;
        }
    }

    // Événements
    loadDataBtn.addEventListener('click', () => {
        loadData(1);  // recharge avec les nouveaux filtres
    });
    scrapeAsyncBtn.addEventListener('click', runScrapeAsync);
    scrapeSyncBtn.addEventListener('click', runScrapeSync);
    viewLogsBtn.addEventListener('click', () => {
        if (logsPanel.classList.contains('show')) {
            logsPanel.classList.remove('show');
        } else {
            showLogs();
        }
    });

    // Chargement initial
    loadData();
    loadMetrics();
    // Auto-refresh toutes les 30 secondes (optionnel, peut être désactivé)
    setInterval(() => { loadData(currentPage); loadMetrics(); }, 30000);
</script>
</body>
</html>
