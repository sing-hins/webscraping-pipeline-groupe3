version: "3.9"

services:
  db:
    image: postgres:15
    container_name: webscraping_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-commodities_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: webscraping_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: webscraping_api
    restart: always
    command: python api/app.py
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    container_name: webscraping_worker
    restart: always
    command: celery -A tasks.celery_tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

  beat:
    build: .
    container_name: webscraping_beat
    restart: always
    command: celery -A tasks.celery_tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - worker
    volumes:
      - .:/app

  flower:
    build: .
    container_name: webscraping_flower
    restart: always
    command: celery -A tasks.celery_tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:latest
    container_name: webscraping_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: webscraping_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
